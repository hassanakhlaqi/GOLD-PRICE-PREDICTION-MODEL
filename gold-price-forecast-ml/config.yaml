data:
  ticker: "GC=F"
  start_date: "2020-01-01"
  end_date: "2026-05-25"
  raw_output_path: "Data/raw/xauusd_raw.csv"
  processed_output_path: "Data/processed/xauusd_features.csv"

model:
  test_size: 0.2
  random_state: 42
  n_estimators: 100
  learning_rate: 0.05
  max_depth: 5
  model_path: "Models/xgboost_model.pkl"

preprocessing:
  sma_windows: [10, 30, 50]
  ema_windows: [12, 26]
  rsi_window: 14
  bb_window: 20
  atr_window: 14
  lag_steps: [1, 2, 3]

api:
  host: "0.0.0.0"
  port: 8000
  workers: 4

streamlit:
  backtest_days: 180
  short_window: 20
  long_window: 50
  account_capital: 10000
  risk_percentage: 1.0